apiVersion: v1
kind: ConfigMap
metadata:
  namespace: finflow
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: "finflow-app"
        metrics_path: "actuator/prometheus"
        static_configs:
          - targets:
              - "finflow-app:8080"
      - job_name: "prometheus"
        static_configs:
          - targets:
              - "localhost:9090"
