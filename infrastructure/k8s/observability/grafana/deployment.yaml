apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: finflow
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yaml
              subPath: prometheus.yaml
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: grafana-finflow-dashboard
              mountPath: /var/lib/grafana/dashboards/finflow-overview.json
              subPath: finflow-overview.json
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: grafana-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              port: 3000
              path: /api/health
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              port: 3000
              path: /api/health
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-finflow-dashboard
          configMap:
            name: grafana-finflow-dashboard

