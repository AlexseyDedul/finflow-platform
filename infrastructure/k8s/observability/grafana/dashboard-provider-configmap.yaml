apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: finflow
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: FinFlow
        orgId: 1
        folder: FinFlow
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards