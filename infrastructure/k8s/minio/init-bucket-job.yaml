apiVersion: batch/v1
kind: Job
metadata:
  name: init-minio-bucket
  namespace: finflow
spec:
  template:
    metadata:
      labels:
        app: init-minio-bucket
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio:9000 local_env local_env
              mc mb --ignore-existing local/finflow-documents
              mc ls local