spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finflow
    username: finflow
    password: finflow
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  aws:
    region: ${APP_AWS_REGION:eu-central-1}
    s3:
      endpoint: ${APP_AWS_S3_ENDPOINT:http://s3server:9000}
      access-key: ${APP_AWS_S3_ACCESS_KEY:local_env}
      access-secret: ${APP_AWS_S3_ACCESS_SECRET:local_env}
      force-path-style: ${APP_AWS_S3_FORCE_PATH_STYLE:true}
      documents-bucket: ${APP_AWS_S3_DOCUMENTS_BUCKET:finflow-documents}
