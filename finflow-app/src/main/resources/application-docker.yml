spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finflow
    username: finflow
    password: finflow
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  aws:
    region: ${APP_AWS_REGION:eu-central-1}
    s3:
      endpoint: ${APP_AWS_S3_ENDPOINT:http://s3server:9000}
      access-key: ${APP_AWS_S3_ACCESS_KEY:local_env}
      access-secret: ${APP_AWS_S3_ACCESS_SECRET:local_env}
      force-path-style: ${APP_AWS_S3_FORCE_PATH_STYLE:true}
      documents-bucket: ${APP_AWS_S3_DOCUMENTS_BUCKET:finflow-documents}
    sqs:
      endpoint: ${APP_AWS_SQS_ENDPOINT:http://localstack:4566}
      access-key: ${APP_AWS_SQS_ACCESS_KEY:test}
      access-secret: ${APP_AWS_SQS_ACCESS_SECRET:test}
      expense-submitted-queue-name: ${APP_AWS_SQS_EXPENSE_SUBMITTED_QUEUE_NAME:expense-submitted-events}
      polling-delay-ms: 5000

camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
      first-name: admin
    filter:
      create: All tasks
