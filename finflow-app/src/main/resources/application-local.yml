spring:
  application:
    name: finflow-app
  datasource:
    url: jdbc:postgresql://localhost:5432/finflow
    username: finflow
    password: finflow
  jpa:
    hibernate:
      ddl-auto: validate

app:
  aws:
    region: eu-central-1
    s3:
      endpoint: http://s3server:9000
      access-key: local_env
      access-secret: local_env
      force-path-style: true
      documents-bucket: finflow-documents
